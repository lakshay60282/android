name: Linux Desktop

on:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Install Everything
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            xfce4 xfce4-terminal \
            dbus-x11 x11vnc xvfb \
            curl openssh-client \
            --no-install-recommends
          
          # Install latest noVNC
          cd /opt
          sudo git clone https://github.com/novnc/noVNC.git
          sudo git clone https://github.com/novnc/websockify.git
          cd /opt/noVNC/utils
          sudo ln -s /opt/websockify /opt/noVNC/utils/websockify

      - name: Start Desktop and Services
        run: |
          # Start display
          Xvfb :1 -screen 0 1280x720x24 -ac &
          sleep 3
          
          # Fix dbus
          export DISPLAY=:1
          eval $(dbus-launch --sh-syntax)
          export DBUS_SESSION_BUS_ADDRESS
          
          # Start XFCE desktop
          DISPLAY=:1 xfce4-session &
          sleep 6
          
          # Start VNC with password
          x11vnc \
            -display :1 \
            -passwd desktop123 \
            -listen 0.0.0.0 \
            -forever \
            -shared \
            -noxdamage \
            -noxfixes &
          sleep 3
          
          echo "VNC started on port 5900"

      - name: Start noVNC
        run: |
          # Start noVNC with correct host parameter
          /opt/noVNC/utils/novnc_proxy \
            --vnc localhost:5900 \
            --listen 6080 &
          sleep 5
          echo "noVNC started on port 6080"

      - name: Start Tunnels
        run: |
          # Browser tunnel
          ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ConnectTimeout=10 \
            -R 80:localhost:6080 \
            nokey@localhost.run > /tmp/browser.txt 2>&1 &
          
          # VNC Viewer tunnel  
          ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ConnectTimeout=10 \
            -R 5900:localhost:5900 \
            nokey@localhost.run > /tmp/vnc.txt 2>&1 &
          
          sleep 20
          
          echo "========= BROWSER ACCESS ========="
          grep -o 'https://[^ ]*\.lhr\.life' /tmp/browser.txt | head -1
          echo "Open URL then go to vnc_auto.html"
          echo "Password: desktop123"
          echo ""
          echo "========= VNC VIEWER APP ========="
          grep -o '[a-z0-9]*\.lhr\.life' /tmp/vnc.txt | head -1
          echo "Port: 5900"
          echo "Password: desktop123"
          echo "=================================="

      - name: Keep Alive
        run: sleep 3300

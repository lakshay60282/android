name: Android VM

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            x11vnc xvfb novnc websockify \
            libpulse0 openjdk-17-jdk wget unzip

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest

      - name: Install Emulator and System Image
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools"
          sdkmanager "emulator"
          sdkmanager "system-images;android-28;default;x86"

      - name: Create AVD
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_AVD_HOME=$HOME/.android/avd
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          mkdir -p $HOME/.android/avd
          echo "no" | avdmanager create avd \
            --force \
            --name "test" \
            --abi default/x86 \
            --package "system-images;android-28;default;x86" \
            --device "Nexus 6"
          echo "AVD List:"
          avdmanager list avd

      - name: Start Xvfb
        run: |
          Xvfb :1 -screen 0 1280x720x24 &
          sleep 5

      - name: Start Emulator
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_AVD_HOME=$HOME/.android/avd
          export PATH=$PATH:$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools
          export DISPLAY=:1
          emulator -avd test \
            -no-audio \
            -no-snapshot \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -no-window &
          echo "Waiting for emulator..."
          sleep 30
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 3; done'
          echo "Emulator is ready!"

      - name: Start VNC and ngrok
        run: |
          export DISPLAY=:1
          x11vnc -display :1 -nopw -listen 0.0.0.0 -forever -shared &
          sleep 3
          websockify --web=/usr/share/novnc 6080 localhost:5900 &
          sleep 3
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xf ngrok-v3-stable-linux-amd64.tgz
          ./ngrok config add-authtoken 2XANxc8HcuJepVSCc5a8t8fACPB_6d1uW3nMny8rNeNFT9fdE
          ./ngrok http 6080 &
          sleep 15
          echo "========= ACCESS URL ========="
          curl -s http://localhost:4040/api/tunnels | grep -o 'https://[^"]*'
          echo "=============================="

      - name: Keep Alive
        run: sleep 3600

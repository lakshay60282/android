name: Linux Desktop

on:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Install Desktop and Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            xfce4 xfce4-terminal \
            x11vnc xvfb \
            novnc websockify \
            wget curl openssh-client

      - name: Start Everything and Get URL
        run: |
          Xvfb :1 -screen 0 1280x720x24 &
          sleep 2
          DISPLAY=:1 startxfce4 &
          sleep 3
          DISPLAY=:1 x11vnc -display :1 -nopw \
            -listen 0.0.0.0 -forever -shared &
          sleep 2
          websockify --web=/usr/share/novnc 6080 localhost:5900 &
          sleep 3
          echo "========= ACCESS URL ========="
          ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -R 80:localhost:6080 \
            nokey@localhost.run 2>&1 | tee /tmp/url.txt &
          sleep 15
          cat /tmp/url.txt | grep -o 'https://[^ ]*'
          echo "=============================="

      - name: Keep Alive
        run: sleep 3600

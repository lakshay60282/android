name: Linux Desktop

on:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Install Desktop and Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            xfce4 xfce4-terminal \
            x11vnc xvfb \
            novnc websockify \
            wget curl jq

      - name: Start Desktop
        run: |
          Xvfb :1 -screen 0 1280x720x24 &
          sleep 2
          DISPLAY=:1 startxfce4 &
          sleep 5

      - name: Start VNC
        run: |
          export DISPLAY=:1
          x11vnc -display :1 -nopw \
            -listen 0.0.0.0 \
            -forever -shared &
          sleep 3
          websockify --web=/usr/share/novnc \
            6080 localhost:5900 &
          sleep 3
          echo "VNC started successfully"

      - name: Start ngrok and print URL
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xf ngrok-v3-stable-linux-amd64.tgz
          ./ngrok config add-authtoken 2XANxc8HcuJepVSCc5a8t8fACPB_6d1uW3nMny8rNeNFT9fdE
          ./ngrok http 6080 &
          sleep 20
          echo "========= ACCESS URL ========="
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "=============================="

      - name: Keep Alive
        run: sleep 3600

name: Windows VM

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            x11vnc xvfb novnc websockify \
            wget

      - name: Download Windows ISO
        run: |
          mkdir -p ~/windows-vm
          cd ~/windows-vm
          # Download Tiny11 (lightweight Windows 11 only 2GB)
          wget -q --show-progress "https://archive.org/download/tiny-11-NTDEV/tiny11%202309%20x64.iso" \
            -O windows.iso

      - name: Create Virtual Disk
        run: |
          cd ~/windows-vm
          qemu-img create -f qcow2 windows.img 30G

      - name: Start Xvfb
        run: |
          Xvfb :1 -screen 0 1280x720x24 &
          sleep 3

      - name: Start Windows VM
        run: |
          export DISPLAY=:1
          cd ~/windows-vm
          qemu-system-x86_64 \
            -m 2048 \
            -smp 2 \
            -drive file=windows.img,format=qcow2 \
            -cdrom windows.iso \
            -boot d \
            -vga std \
            -display :1 \
            -net nic \
            -net user \
            -usb \
            -device usb-tablet &
          sleep 10

      - name: Start VNC and ngrok
        run: |
          export DISPLAY=:1
          x11vnc -display :1 -nopw -listen 0.0.0.0 -forever -shared &
          sleep 3
          websockify --web=/usr/share/novnc 6080 localhost:5900 &
          sleep 3
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xf ngrok-v3-stable-linux-amd64.tgz
          ./ngrok config add-authtoken 2XANxc8HcuJepVSCc5a8t8fACPB_6d1uW3nMny8rNeNFT9fdE
          ./ngrok http 6080 &
          sleep 15
          echo "========= ACCESS URL ========="
          curl -s http://localhost:4040/api/tunnels | grep -o 'https://[^"]*'
          echo "=============================="

      - name: Keep Alive
        run: sleep 3600

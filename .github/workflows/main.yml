name: Linux Desktop

on:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Install Everything
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            openbox obconf \
            x11vnc xvfb \
            curl openssh-client \
            xterm \
            --no-install-recommends

          # Install latest noVNC
          cd /opt
          sudo git clone --depth 1 https://github.com/novnc/noVNC.git
          sudo git clone --depth 1 https://github.com/novnc/websockify.git
          sudo ln -s /opt/websockify /opt/noVNC/utils/websockify

      - name: Start Desktop
        run: |
          # Start display
          Xvfb :1 -screen 0 1024x768x16 -ac +extension GLX &
          sleep 3

          export DISPLAY=:1

          # Start lightweight openbox
          DISPLAY=:1 openbox-session &
          sleep 4

          # Start VNC optimized for low lag
          x11vnc \
            -display :1 \
            -passwd desktop123 \
            -listen 0.0.0.0 \
            -forever \
            -shared \
            -noxdamage \
            -noxfixes \
            -noncache \
            -speeds modem \
            -compress 6 \
            -quality 5 \
            -threads &
          sleep 3
          echo "VNC started!"

      - name: Start noVNC
        run: |
          /opt/noVNC/utils/novnc_proxy \
            --vnc localhost:5900 \
            --listen 6080 &
          sleep 5
          echo "noVNC started!"

      - name: Start Serveo Tunnels
        run: |
          # HTTP tunnel for browser noVNC
          ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=3 \
            -o ConnectTimeout=15 \
            -R 80:localhost:6080 \
            serveo.net > /tmp/http.txt 2>&1 &

          # TCP tunnel for VNC Viewer app
          ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=3 \
            -o ConnectTimeout=15 \
            -R 5900:localhost:5900 \
            serveo.net > /tmp/tcp.txt 2>&1 &

          sleep 25

          echo "========= BROWSER ACCESS ========="
          HTTP=$(grep -o 'https://[^ ]*\.serveo\.net' /tmp/http.txt | head -1)
          echo "$HTTP/vnc_auto.html"
          echo "Password: desktop123"
          echo ""
          echo "========= VNC VIEWER APP ========="
          TCP=$(grep -o '[a-z0-9]*\.serveo\.net' /tmp/tcp.txt | head -1)
          echo "Host: $TCP"
          echo "Port: 5900"
          echo "Password: desktop123"
          echo "=================================="

          # Save URLs to file for reference
          echo "$HTTP/vnc_auto.html" > /tmp/urls.txt
          echo "$TCP:5900" >> /tmp/urls.txt
          cat /tmp/urls.txt

      - name: Keep Alive
        run: |
          echo "Everything is running!"
          echo "Check Start Serveo Tunnels step for URLs"
          sleep 3300
